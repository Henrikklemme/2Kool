<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    var path = window.location.pathname;
    if (!path.match(/\.(jpg|png|js|css|ico|webp|svg)$/)) {
      var route = path.replace(/^\/2Kool/, '') || '/';
      if (route !== '/' && route !== '') {
        sessionStorage.setItem('redirect', route);
      }
      window.location.replace('/2Kool/');
    }
  </script>
</head>
<body></body>
</html>

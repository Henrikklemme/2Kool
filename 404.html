<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    var path = window.location.pathname;
    if (!path.match(/\.(jpg|png|js|css|ico|webp|svg)$/)) {
      if (path !== '/' && path !== '') {
        sessionStorage.setItem('redirect', path);
      }
      window.location.replace('/');
    }
  </script>
</head>
<body></body>
</html>
